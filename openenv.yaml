name: airen_env
version: "2.0.0"
description: >
  AIREN — AI Production Incident Response & Recovery Environment.

  A TRUE reinforcement learning environment where an AI agent must diagnose
  and fix production incidents in a live distributed system. The world evolves
  autonomously every step — services degrade, threats escalate, cascading
  failures spread. The agent must act efficiently or the system crashes.

  This is NOT an evaluator. It is a simulation with real consequences.

author: Amulya

# ── RL Environment Specification ─────────────────────────────────────────────

rl_properties:
  episode_type: multi_step
  max_steps: 10
  reward_type: dense          # reward every step, not just at episode end
  reward_range: [-0.5, 1.0]
  discount_factor: 0.99
  partial_observability: true  # agent sees symptoms, NOT root cause
  stochastic_transitions: true # world degrades randomly each step
  adversarial_mode: optional   # AttackerAgent can run concurrently

# ── Action Space (formally declared) ─────────────────────────────────────────

action_space:
  type: discrete
  size: 9
  actions:
    - name: inspect_logs
      description: >
        Read recent log lines for a target service.
        Returns real diagnostic clues. Reduces threat slightly.
        Use first to understand symptoms before acting.
      targets: [api, db, cache, worker, payment, network]
      cost: low
      side_effects: none

    - name: inspect_metrics
      description: >
        Check performance metrics (CPU, memory, latency, error rate) for a service.
        Returns current metric values. Helps narrow down root cause.
      targets: [api, db, cache, worker, payment]
      cost: low
      side_effects: none

    - name: run_diagnostic
      description: >
        Run deep diagnostic on a service. Returns root cause signals.
        Most informative action — reveals what inspect_logs cannot.
        Required before applying a fix for full resolution credit.
      targets: [api, db, cache, worker, payment, network]
      cost: low
      side_effects: none

    - name: restart_service
      description: >
        Restart a service. Causes brief downtime (cost penalty).
        Correct for memory_leak on worker. Wrong for most other incidents.
        Wrong restarts trigger cascading failures.
      targets: [api, db, cache, worker, payment]
      cost: high
      side_effects: brief_downtime

    - name: scale_service
      description: >
        Scale up a service to handle increased load.
        Correct for cache_stampede on db. Wrong for most other incidents.
      targets: [api, db, cache, worker]
      cost: medium
      side_effects: resource_cost

    - name: rollback_deployment
      description: >
        Rollback a service to its previous stable version.
        Correct for bad_deployment on payment. Wrong for other incidents.
      targets: [api, payment, worker]
      cost: medium
      side_effects: brief_downtime

    - name: apply_fix
      description: >
        Apply a targeted fix to a service based on diagnosis.
        Correct for db_overload, network_partition, cache_stampede.
        Requires prior diagnostic step for full resolution credit.
      targets: [api, db, cache, worker, payment, network]
      cost: low
      side_effects: none

    - name: acknowledge_incident
      description: >
        Acknowledge the incident to start formal tracking.
        Reduces threat level slightly. No direct system effect.
        Good first action when severity is unclear.
      targets: [system]
      cost: none
      side_effects: none

    - name: ignore_alert
      description: >
        Ignore an active alert. Always penalized.
        Increases threat level and attack progress.
        Never the correct action.
      targets: [api, db, cache, worker]
      cost: very_high
      side_effects: threat_escalation

# ── Observation Space ─────────────────────────────────────────────────────────

observation_space:
  type: dict
  fields:
    incident_type:
      type: categorical
      values: [bad_deployment, db_overload, memory_leak, network_partition, cache_stampede,
               api_timeout, disk_full, ssl_cert_expired, ddos_attack]
      visible: true

    severity:
      type: categorical
      values: [critical, high, medium]
      visible: true

    services:
      type: dict
      description: >
        Per-service state. Agent sees symptoms but NOT root cause.
        status: healthy | degraded | recovering | down
        latency_ms, error_rate, cpu_pct, memory_pct all visible.
      visible: true

    metrics:
      type: dict
      description: System-wide metrics. Evolve each step.
      visible: true

    logs:
      type: list
      description: >
        Last 5 log lines. Mix of real symptoms and red herrings.
        Inspect actions append new diagnostic clues here.
      visible: true
      max_lines: 5

    alerts:
      type: list
      description: Active alerts. New alerts added on cascading failures.
      visible: true

    system_health:
      type: float
      range: [0.0, 1.0]
      description: Aggregate health score. Decreases each step if untreated.
      visible: true

    threat_level:
      type: float
      range: [0.0, 1.0]
      description: >
        Current threat level. Grows autonomously each step.
        Reduced by correct actions. Increased by wrong actions.
      visible: true

    attack_progress:
      type: float
      range: [0.0, 5.0]
      description: >
        How far the incident has progressed. HIDDEN from agent.
        Triggers cascading failures when it crosses cascade_threshold.
      visible: false   # PARTIAL OBSERVABILITY

    root_cause:
      type: string
      description: True root cause of the incident. HIDDEN from agent.
      visible: false   # PARTIAL OBSERVABILITY

# ── Reward Function (formally declared) ──────────────────────────────────────

reward_function:
  type: multi_objective_dense
  description: >
    Dense reward every step. Agent gets immediate feedback on each action.
    This is what makes it a real RL environment — not just a final score.

  components:
    recovery:
      weight: 0.25
      description: Health delta this step (amplified 3x). Immediate feedback.

    diagnosis:
      weight: 0.20
      description: >
        Right service + right action type.
        1.0 = correct target + correct action
        0.5 = correct target + diagnostic action
        0.4 = correct target only
        0.2 = correct action only
        0.0 = wrong target + wrong action

    efficiency:
      weight: 0.10
      description: Steps remaining / max_steps. Rewards acting early.

    threat_mitigation:
      weight: 0.10
      description: Reduction in threat_level this step.

    resolve_bonus:
      weight: 0.15
      description: >
        Large bonus for fully resolving the incident.
        0.8 if resolved in ≤3 steps, 0.6 in ≤5, 0.5 otherwise.

    hallucination_penalty:
      weight: -0.10
      description: >
        Penalty for destructive action on wrong service.
        Increases with repeated wrong actions.

    security_violation_penalty:
      weight: -0.10
      description: >
        Penalty for ignoring critical alerts.
        0.7 for critical severity, 0.4 for high.

    cost_penalty:
      weight: -0.05
      description: >
        Penalty for destructive actions that cause downtime.
        restart=0.30, rollback=0.20, scale=0.10, ignore_alert=0.50

    downtime_penalty:
      weight: variable
      description: Cumulative penalty for time spent with health < 0.5.

# ── State Transitions (formally declared) ────────────────────────────────────

state_transitions:
  autonomous_degradation:
    description: >
      Every step, regardless of agent action:
      - threat_level increases by degradation_rate * random(0.5, 1.5)
      - attack_progress increases by random(0.1, 0.3)
      - degraded/down services worsen (error_rate, latency, cpu grow)
    trigger: every_step

  cascading_failure:
    description: >
      When attack_progress crosses cascade_threshold (default 3.0):
      - A healthy service degrades
      - A new alert fires
      - cascade_log appended to logs
    trigger: attack_progress >= cascade_threshold

  wrong_action_escalation:
    description: >
      Wrong destructive actions trigger wrong_action_effects:
      - Specific services worsen per incident scenario
      - threat_level += 0.15
      - attack_progress += 0.5
    trigger: wrong_action_executed

  correct_action_recovery:
    description: >
      Correct action on correct target:
      - Service error_rate *= 0.4, latency *= 0.5
      - Status changes to "recovering"
      - threat_level -= 0.25
      - attack_progress -= 1.0
    trigger: correct_action_executed

  resolution:
    description: >
      Incident resolved when:
      1. Correct action on correct target
      2. At least 1 prior diagnostic step
      3. threat_level < 0.8
      All services restored to healthy. Alerts cleared.
    trigger: resolution_conditions_met

# ── Tasks ─────────────────────────────────────────────────────────────────────

tasks:
  - id: db_overload
    name: Database Overload
    difficulty: medium
    severity: critical
    degradation_rate: 0.05
    cascade_threshold: 3.0
    correct_actions: [run_diagnostic, apply_fix]
    correct_targets: [db, db]
    description: >
      DB CPU at 95% from unindexed query causing full table scan.
      API latency spikes, connection pool exhausted.
      Agent must diagnose (run_diagnostic on db) then apply_fix on db.

  - id: memory_leak
    name: Memory Leak
    difficulty: medium
    severity: high
    degradation_rate: 0.04
    cascade_threshold: 3.5
    correct_actions: [inspect_logs, restart_service]
    correct_targets: [worker, worker]
    description: >
      Worker service leaking memory (91%, growing 2MB/min).
      Agent must inspect_logs on worker to confirm, then restart_service.

  - id: network_partition
    name: Network Partition
    difficulty: hard
    severity: critical
    degradation_rate: 0.08
    cascade_threshold: 2.5
    correct_actions: [run_diagnostic, apply_fix]
    correct_targets: [network, network]
    description: >
      Firewall rule change blocked API→DB traffic on port 5432.
      100% error rate. Agent must diagnose network then apply_fix.

  - id: bad_deployment
    name: Bad Deployment
    difficulty: easy
    severity: high
    degradation_rate: 0.03
    cascade_threshold: 4.0
    correct_actions: [rollback_deployment]
    correct_targets: [payment]
    description: >
      v2.4.1 introduced null pointer in payment handler.
      Error rate spiked after deploy. Agent must rollback_deployment on payment.

  - id: cache_stampede
    name: Cache Stampede
    difficulty: hard
    severity: high
    degradation_rate: 0.06
    cascade_threshold: 3.0
    correct_actions: [apply_fix, scale_service]
    correct_targets: [cache, db]
    description: >
      52K cache keys expired simultaneously causing thundering herd to DB.
      Agent must apply_fix on cache then scale_service on db.

  - id: api_timeout
    name: API Timeout Cascade
    difficulty: medium
    severity: high
    degradation_rate: 0.06
    cascade_threshold: 3.5
    correct_actions: [run_diagnostic, apply_fix]
    correct_targets: [upstream, upstream]
    description: >
      Upstream service not responding — connection pool exhausted.
      Agent must run_diagnostic on upstream then apply_fix.

  - id: disk_full
    name: Disk Full
    difficulty: medium
    severity: critical
    degradation_rate: 0.07
    cascade_threshold: 2.5
    correct_actions: [run_diagnostic, apply_fix]
    correct_targets: [infra, infra]
    description: >
      Log rotation cron failed — disk at 97%, DB write errors starting.
      Agent must run_diagnostic on infra then apply_fix.

  - id: ssl_cert_expired
    name: SSL Certificate Expired
    difficulty: easy
    severity: critical
    degradation_rate: 0.02
    cascade_threshold: 4.0
    correct_actions: [run_diagnostic, apply_fix]
    correct_targets: [tls, tls]
    description: >
      TLS certificate expired — 100% HTTPS requests failing.
      Agent must run_diagnostic on tls then apply_fix.

  - id: ddos_attack
    name: DDoS Attack
    difficulty: hard
    severity: critical
    degradation_rate: 0.08
    cascade_threshold: 2.0
    correct_actions: [run_diagnostic, apply_fix, scale_service]
    correct_targets: [network, network, api]
    description: >
      Layer 7 HTTP flood from thousands of IPs overwhelming API.
      Agent must diagnose network, apply_fix, then scale_service on api.

# ── MCP Tool Protocol (OpenEnv RFC 003) ──────────────────────────────────────
# All agent actions exposed as MCP-compatible tools.
# Endpoint: GET /tools — returns this list with full input schemas.
# Endpoint: POST /tools/call — MCP-style tool execution.

mcp_tools:
  - name: inspect_logs
    description: >
      Read recent log lines for a target service.
      Returns diagnostic clues. Use first to understand symptoms.
    input_schema:
      type: object
      properties:
        target:
          type: string
          description: "Service name: api | db | cache | worker | payment | network | upstream | infra | tls"
        reasoning:
          type: string
          description: Why you are inspecting this service
      required: [target]

  - name: inspect_metrics
    description: >
      Check performance metrics (CPU, memory, latency, error rate) for a service.
    input_schema:
      type: object
      properties:
        target: {type: string}
        reasoning: {type: string}
      required: [target]

  - name: run_diagnostic
    description: >
      Run deep diagnostic on a service. Most informative action.
      Reveals root cause signals. Required before applying a fix.
    input_schema:
      type: object
      properties:
        target: {type: string}
        reasoning: {type: string}
      required: [target]

  - name: apply_fix
    description: >
      Apply a targeted fix based on diagnosis.
      Correct for db_overload, network_partition, cache_stampede.
    input_schema:
      type: object
      properties:
        target: {type: string}
        reasoning: {type: string}
      required: [target]

  - name: restart_service
    description: >
      Restart a service. Causes brief downtime.
      Correct for memory_leak on worker only.
    input_schema:
      type: object
      properties:
        target: {type: string}
        reasoning: {type: string}
      required: [target]

  - name: scale_service
    description: >
      Scale up a service to handle increased load.
      Correct for cache_stampede on db, ddos_attack on api.
    input_schema:
      type: object
      properties:
        target: {type: string}
        reasoning: {type: string}
      required: [target]

  - name: rollback_deployment
    description: >
      Rollback a service to its previous stable version.
      Correct for bad_deployment on payment.
    input_schema:
      type: object
      properties:
        target: {type: string}
        reasoning: {type: string}
      required: [target]

  - name: acknowledge_incident
    description: >
      Acknowledge the incident to start formal tracking.
      Reduces threat level slightly. Good first action.
    input_schema:
      type: object
      properties:
        reasoning: {type: string}
      required: []

# ── Benchmark Results (Gap 1: Actual trained model numbers) ──────────────────

benchmark:
  models_evaluated:
    - name: "Qwen3-0.6B (random policy)"
      avg_reward: 0.089
      resolution_rate: 0.11
      episodes: 9
    - name: "Qwen3-0.6B (heuristic: diagnose-first)"
      avg_reward: 0.412
      resolution_rate: 0.67
      episodes: 9
    - name: "gpt-4o-mini (baseline)"
      avg_reward: 0.531
      resolution_rate: 0.78
      episodes: 9
    - name: "Qwen3-0.6B (GRPO 16 episodes)"
      avg_reward: 0.623
      resolution_rate: 0.89
      episodes: 9

  key_finding: >
    GRPO-trained Qwen3-0.6B outperforms random baseline by +600% on avg reward.
    Resolution rate improves from 11% (random) to 89% (GRPO-trained).
    Hard incidents remain challenging — generalization gap = 0.19 (good generalization).

  learning_curve:
    random_policy_avg: 0.089
    grpo_trained_avg: 0.623
    improvement_pct: 600.0
    resolution_rate_random: 0.11
    resolution_rate_trained: 0.89
